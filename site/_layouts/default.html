<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="baseurl" content="{{ site.baseurl }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% if page.layout == 'search' or page.layout == 'post' %}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js" integrity="sha512-T8xxpazDtODy3WOP/c6hvQI2O9UPdARlDWE0CvH1Pfqc2/K70jNPmqga0ZusStVcaw3SmaZNrgSESNHHfIpe5Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  {% endif %}
  {% seo %}
</head>
<body>
  <header class="site-header">
    <nav>
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/tags/' | relative_url }}">Browse by Topic</a>
        <a href="{{ '/search/' | relative_url }}">Search</a>
      </div>
    </nav>
  </header>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: '%Y' }} PMx Daily. Powered by <a href="https://jekyllrb.com">Jekyll</a> &amp; <a href="https://pages.github.com">GitHub Pages</a>.</p>
  </footer>
</body>
</html>
